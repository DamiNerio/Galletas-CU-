<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Galletas MTY🍪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 fw-bold text-primary">Panel de Administración - Galletas MTY</h2>

    <div class="card shadow-sm mb-5 border-0">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0 fw-bold">Gestión de Pedidos</h5>
            <div>
               
<button class="btn btn-primary btn-sm" onclick="cargarPedidosAdmin('pendiente')">Ver Pendientes</button>
<button class="btn btn-secondary btn-sm" onclick="cargarPedidosAdmin('entregado')">Ver Entregados</button>
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Cliente</th>
                            <th>Teléfono</th>
                            <th>Dirección</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-admin-pedidos">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 fw-bold">Control de Stock (Inventario)</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-sm align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Producto</th>
                            <th style="width: 150px;">Stock Actual</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./JS/admin.js"></script>
</body>
<div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Detalles del Pedido</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul class="list-group list-group-flush" id="lista-detalles">
          
        </ul>
      </div>
    </div>
  </div>
</div>

<a href="index.HTML" 
   class="btn btn-primary btn-lg shadow-lg" 
   style="position: fixed; bottom: 20px; right: 20px; border-radius: 50px; z-index: 1000;">
    <i class="bi bi-cart4"></i> Ir a Comprar
</a>
</html>
