<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Galletas MTY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fdf5e6; height: 100vh; display: flex; align-items: center; }
        .auth-card { max-width: 400px; width: 100%; margin: auto; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="card auth-card p-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-warning">🍪Galletas C.U.</h2>
            <p id="auth-title" class="text-muted">Inicia sesión para comprar</p>
        </div>

        <form id="auth-form">
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="ejemplo@mty.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div id="register-fields" class="d-none">
                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" id="full_name" class="form-control" placeholder="Tu nombre">
                </div>
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold" id="btn-auth">Entrar</button>
        </form>

        <div class="text-center mt-3">
            <a href="#" id="toggle-auth" class="text-decoration-none small">¿No tienes cuenta? Regístrate aquí</a>
        </div>
        <div class="text-center mt-2">
            <a href="index.html" class="text-muted small">← Volver a la tienda</a>
        </div>
    </div>

    <script src="JS/auth.js" type="module"></script>
</body>
</html>
