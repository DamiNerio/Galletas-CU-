<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Galletas MTY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-light bg-white shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">🍪Galletas C.U.</a>
            <a href="index.html" class="btn btn-outline-secondary btn-sm">Volver</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm border-0" style="border-radius: 15px;">
                    <h3 class="fw-bold mb-4">Mi Perfil</h3>
                    <form id="perfil-form">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">NOMBRE</label>
                            <input type="text" id="perf-nombre" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">TELÉFONO</label>
                            <input type="text" id="perf-tel" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">DIRECCIÓN DE ENTREGA</label>
                            <textarea id="perf-dir" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="JS/perfil.js" type="module"></script>
</body>
</html>
