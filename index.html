<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galletas | Sabor Casero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .cookie-card { transition: transform 0.2s; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cookie-card:hover { transform: translateY(-5px); }
        .hero-section { background: #fdf5e6; padding: 60px 0; text-align: center; }
        .badge-mty { background-color: #f39c12; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">🍪Galletas C.U.</a>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-dark position-relative me-3" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                    <i class="bi bi-cart3"></i>
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </button>
               <div id="user-menu">
                  <div class="spinner-border spinner-border-sm text-warning" role="status"></div>
               </div>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold">Las mejores galletas de C.U.</h1>
            <p class="lead text-muted">Horneadas diariamente con ingredientes premium. Entrega en Ciudad Universitaria.</p>
        </div>
    </header>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Nuestro Menú</h2>
            <span class="badge badge-mty p-2">📍 Ciudad Universitaria</span>
        </div>
        
        <div class="row g-4" id="contenedor-galletas">
            <div class="col-md-4">
                <div class="card cookie-card h-100">
                    <div class="placeholder-glow">
                        <div class="placeholder col-12" style="height: 200px;"></div>
                    </div>
                    <div class="card-body text-center">
                        <h5 class="card-title">Cargando delicias...</h5>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalCarrito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tu Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-group list-group-flush" id="lista-carrito">
                        </ul>
                    <div class="mt-3 text-end">
                        <h4 class="fw-bold">Total: $<span id="total-carrito">0.00</span></h4>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Seguir comprando</button>
                    <button class="btn btn-warning" onclick="realizarPedido()">Finalizar Pedido</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" type="module"></script>
</body>
<li class="nav-item" id="btn-admin-seguridad" style="display: none;">
    <a class="nav-link btn btn-outline-danger" href="admin.html">Panel Admin</a>
</li>

</html>
